<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSA Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#020617;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background-image:linear-gradient(135deg,#020617 0%,#0a1628 50%,#020c1a 100%);}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(52,211,153,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(52,211,153,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    .orb1{position:fixed;top:20%;left:10%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(52,211,153,0.06) 0%,transparent 70%);pointer-events:none;animation:glow 4s ease-in-out infinite;}
    .orb2{position:fixed;bottom:15%;right:8%;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,0.06) 0%,transparent 70%);pointer-events:none;animation:glow 5s ease-in-out infinite 1s;}
    @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .chat-wrap{width:100%;max-width:500px;height:min(780px,94vh);background:rgba(2,6,23,0.97);border:1px solid rgba(52,211,153,0.2);border-radius:24px;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(52,211,153,0.05),0 32px 80px rgba(0,0,0,0.8);overflow:hidden;position:relative;}

    /* Header */
    .header{padding:16px 20px;background:rgba(52,211,153,0.05);border-bottom:1px solid rgba(52,211,153,0.15);display:flex;align-items:center;gap:12px;}
    .bot-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#059669,#0d9488);display:flex;align-items:center;justify-content:center;color:white;font-size:22px;box-shadow:0 4px 16px rgba(5,150,105,0.4);flex-shrink:0;}
    .bot-name{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:#34d399;}
    .bot-status{display:flex;align-items:center;gap:6px;margin-top:3px;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:pulse 2s infinite;}
    .status-text{font-size:11px;color:#34d399;font-family:'JetBrains Mono',monospace;opacity:.7;}
    .qns-badge{margin-left:auto;text-align:right;font-size:10px;color:#1e3a2f;font-family:'JetBrains Mono',monospace;font-weight:600;}

    /* Topics */
    .topics{padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.04);}
    .topic-btn{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid rgba(52,211,153,0.2);background:rgba(52,211,153,0.05);color:#34d399;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s;}
    .topic-btn:hover{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.5);}

    /* Messages */
    .messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;}
    .messages::-webkit-scrollbar{width:3px;}
    .messages::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px;}

    .msg-wrap{display:flex;flex-direction:column;animation:fadeUp .3s ease;}
    .msg-wrap.user{align-items:flex-end;}
    .msg-wrap.bot{align-items:flex-start;}
    .msg-label{font-size:10px;color:#1e3a2f;margin-bottom:4px;font-family:'JetBrains Mono',monospace;padding:0 2px;}
    .bubble{max-width:88%;padding:10px 14px;font-size:13.5px;line-height:1.65;white-space:pre-wrap;}
    .bubble.user{background:linear-gradient(135deg,#059669,#047857);border-radius:18px 18px 4px 18px;color:rgba(255,255,255,.95);box-shadow:0 4px 16px rgba(5,150,105,.3);}
    .bubble.bot{background:rgba(15,23,42,.8);border:1px solid rgba(52,211,153,.2);border-radius:4px 18px 18px 18px;color:rgba(255,255,255,.85);}
    .bubble.bot.error{border-color:rgba(248,113,113,.3);}
    .bubble.bot.success{border-color:rgba(52,211,153,.4);}
    .bubble.bot.hint{border-color:rgba(251,191,36,.3);}
    .msg-time{font-size:10px;color:#1e293b;margin-top:3px;padding:0 4px;}

    /* Question Card */
    .q-card{background:rgba(255,255,255,.03);border:1px solid rgba(52,211,153,.2);border-radius:16px;overflow:hidden;max-width:88%;}
    .q-card-header{padding:10px 14px;background:rgba(52,211,153,.08);border-bottom:1px solid rgba(52,211,153,.15);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .q-id{font-size:11px;font-weight:700;color:#34d399;font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
    .q-diff{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
    .diff-Easy{background:rgba(52,211,153,.15);color:#34d399;}
    .diff-Medium{background:rgba(251,191,36,.15);color:#fbbf24;}
    .diff-Hard{background:rgba(248,113,113,.15);color:#f87171;}
    .q-body{padding:12px 14px;}
    .q-text{color:rgba(255,255,255,.9);font-size:13.5px;line-height:1.6;margin-bottom:8px;}
    .q-example{background:rgba(0,0,0,.3);border-radius:8px;padding:8px 12px;font-size:12px;color:#94a3b8;font-family:'JetBrains Mono',monospace;line-height:1.5;}
    .q-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
    .q-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'JetBrains Mono',monospace;border:1px solid;}
    .q-btn.hint{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1);color:#fbbf24;}
    .q-btn.hint:hover{background:rgba(251,191,36,.2);}
    .q-btn.solution{border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.1);color:#34d399;}
    .q-btn.solution:hover{background:rgba(52,211,153,.2);}
    .q-btn.next{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.1);color:#60a5fa;}
    .q-btn.next:hover{background:rgba(96,165,250,.2);}

    /* Code block */
    .code-block{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin-top:6px;}
    .code-header{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;}
    .code-lang{font-size:11px;color:#64748b;font-family:'JetBrains Mono',monospace;}
    .code-copy{font-size:10px;color:#64748b;background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;}
    .code-copy:hover{color:#34d399;}
    pre{margin:0;padding:12px;font-size:12.5px;line-height:1.6;color:#e2e8f0;overflow-x:auto;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;}

    /* Typing */
    .typing-dots{display:flex;gap:5px;padding:10px 14px;align-items:center;}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;animation:bounce 1.2s infinite;}
    .typing-dots span:nth-child(2){animation-delay:.2s;}
    .typing-dots span:nth-child(3){animation-delay:.4s;}

    /* Input */
    .input-area{padding:12px 14px 16px;border-top:1px solid rgba(52,211,153,.1);background:rgba(0,0,0,.3);}
    .code-mode-label{font-size:11px;color:#fbbf24;font-family:'JetBrains Mono',monospace;margin-bottom:6px;display:none;}
    .code-mode-label.show{display:flex;align-items:center;gap:6px;}
    .input-box{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,.03);border:1px solid rgba(52,211,153,.15);border-radius:16px;padding:10px 10px 10px 14px;transition:border-color .2s;}
    .input-box.codemode{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.03);}
    #msgInput{flex:1;background:transparent;border:none;outline:none;color:rgba(255,255,255,.9);font-size:14px;line-height:1.5;min-height:24px;max-height:120px;overflow-y:auto;font-family:'Outfit',sans-serif;resize:none;}
    #msgInput.codemode{font-family:'JetBrains Mono',monospace;font-size:12.5px;}
    .btn-code{width:34px;height:34px;border-radius:10px;border:none;background:rgba(255,255,255,.05);color:#475569;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:16px;}
    .btn-code:hover,.btn-code.active{background:rgba(251,191,36,.2);color:#fbbf24;}
    .btn-send{width:34px;height:34px;border-radius:10px;border:none;background:rgba(255,255,255,.05);color:#1e3a2f;cursor:not-allowed;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:16px;}
    .btn-send.active{background:linear-gradient(135deg,#059669,#0d9488);color:white;cursor:pointer;box-shadow:0 4px 14px rgba(5,150,105,.4);}
    .quick-cmds{display:flex;justify-content:center;gap:16px;margin-top:8px;}
    .quick-cmd{font-size:10.5px;color:#1e3a2f;background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;padding:2px 4px;transition:color .2s;}
    .quick-cmd:hover{color:#34d399;}
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb1"></div>
<div class="orb2"></div>

<div class="chat-wrap">
  <!-- Header -->
  <div class="header">
    <div class="bot-avatar">🧠</div>
    <div>
      <div class="bot-name">DSA_BOT <span style="color:#475569;font-size:12px">v2.0</span></div>
      <div class="bot-status">
        <span class="status-dot"></span>
        <span class="status-text">ONLINE • NO API • LOCAL ENGINE</span>
      </div>
    </div>
    <div class="qns-badge">10 QNS<br>LOADED</div>
  </div>

  <!-- Topics -->
  <div class="topics" id="topics"></div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="code-mode-label" id="codeModeLabel">💻 CODE MODE — Error check hoga</div>
    <div class="input-box" id="inputBox">
      <textarea id="msgInput" rows="1" placeholder="DSA question poochho ya code paste karo..."></textarea>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
        <button class="btn-code" id="btnCode" title="Code Mode" onclick="toggleCodeMode()">💻</button>
        <button class="btn-send" id="btnSend" onclick="sendMessage()">➤</button>
      </div>
    </div>
    <div class="quick-cmds">
      <button class="quick-cmd" onclick="sendMessage('start')">💬 start</button>
      <button class="quick-cmd" onclick="sendMessage('hint')">💡 hint</button>
      <button class="quick-cmd" onclick="sendMessage('solution')">✅ solution</button>
      <button class="quick-cmd" onclick="sendMessage('next')">⏭ next</button>
    </div>
  </div>
</div>

<script>
// ── DATASET ──────────────────────────────────────────────
const DSA_QUESTIONS = [
  {id:1,topic:"Array",difficulty:"Easy",question:"Two Sum: Array aur target diya hai. Do numbers ke indices return karo jinका sum target ke barabar ho.",example:"Input: nums=[2,7,11,15], target=9 → Output: [0,1]",hint:"HashMap use karo — har element ke liye (target - element) ko map mein check karo.",solution:`def two_sum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        complement = target - num\n        if complement in seen:\n            return [seen[complement], i]\n        seen[num] = i`,keywords:["two sum","twosum","array sum","target sum"]},
  {id:2,topic:"Array",difficulty:"Easy",question:"Reverse Array: Ek array ko in-place reverse karo without extra space.",example:"Input: [1,2,3,4,5] → Output: [5,4,3,2,1]",hint:"Two pointers use karo — left aur right se swap karte jao middle tak.",solution:`def reverse_array(arr):\n    left, right = 0, len(arr) - 1\n    while left < right:\n        arr[left], arr[right] = arr[right], arr[left]\n        left += 1\n        right -= 1\n    return arr`,keywords:["reverse array","array reverse","reverse"]},
  {id:3,topic:"String",difficulty:"Easy",question:"Palindrome Check: Ek string palindrome hai ya nahi check karo.",example:"Input: 'racecar' → True, Input: 'hello' → False",hint:"String ko reverse karke original se compare karo.",solution:`def is_palindrome(s):\n    s = s.lower().replace(" ", "")\n    return s == s[::-1]`,keywords:["palindrome","string palindrome","check palindrome"]},
  {id:4,topic:"LinkedList",difficulty:"Medium",question:"Reverse Linked List: Ek singly linked list ko reverse karo.",example:"Input: 1→2→3→4→5 → Output: 5→4→3→2→1",hint:"Teen pointers use karo: prev=None, curr=head, next_node.",solution:`def reverse_list(head):\n    prev = None\n    curr = head\n    while curr:\n        next_node = curr.next\n        curr.next = prev\n        prev = curr\n        curr = next_node\n    return prev`,keywords:["reverse linked list","linkedlist","linked list"]},
  {id:5,topic:"Tree",difficulty:"Medium",question:"Binary Tree Inorder Traversal: Binary tree ka inorder traversal karo (Left → Root → Right).",example:"Tree: [1,null,2,3] → Output: [1,3,2]",hint:"Recursive: pehle left subtree, phir root, phir right.",solution:`def inorder(root):\n    result = []\n    def traverse(node):\n        if node:\n            traverse(node.left)\n            result.append(node.val)\n            traverse(node.right)\n    traverse(root)\n    return result`,keywords:["inorder","tree traversal","binary tree"]},
  {id:6,topic:"Stack",difficulty:"Easy",question:"Valid Parentheses: String mein brackets valid hain ya nahi check karo.",example:"Input: '()[]{}' → True, Input: '(]' → False",hint:"Stack use karo — opening bracket push, closing pe pop karke match check karo.",solution:`def is_valid(s):\n    stack = []\n    mapping = {')': '(', '}': '{', ']': '['}\n    for char in s:\n        if char in mapping:\n            top = stack.pop() if stack else '#'\n            if mapping[char] != top:\n                return False\n        else:\n            stack.append(char)\n    return not stack`,keywords:["parentheses","valid parentheses","brackets","stack"]},
  {id:7,topic:"Sorting",difficulty:"Medium",question:"Bubble Sort: Array ko bubble sort se ascending order mein sort karo.",example:"Input: [64,34,25,12] → Output: [12,25,34,64]",hint:"Nested loops — adjacent elements compare aur swap karo.",solution:`def bubble_sort(arr):\n    n = len(arr)\n    for i in range(n):\n        for j in range(0, n-i-1):\n            if arr[j] > arr[j+1]:\n                arr[j], arr[j+1] = arr[j+1], arr[j]\n    return arr`,keywords:["bubble sort","sort","sorting"]},
  {id:8,topic:"Graph",difficulty:"Medium",question:"BFS: Graph mein Breadth First Search traversal implement karo.",example:"Graph: {0:[1,2], 1:[2]} → BFS from 0: [0,1,2]",hint:"Queue use karo — start node enqueue, har node ke neighbors visit karo.",solution:`from collections import deque\ndef bfs(graph, start):\n    visited = set()\n    queue = deque([start])\n    visited.add(start)\n    result = []\n    while queue:\n        node = queue.popleft()\n        result.append(node)\n        for n in graph[node]:\n            if n not in visited:\n                visited.add(n)\n                queue.append(n)\n    return result`,keywords:["bfs","breadth first","graph"]},
  {id:9,topic:"DP",difficulty:"Medium",question:"Fibonacci: nth Fibonacci number find karo using Dynamic Programming.",example:"Input: n=10 → Output: 55",hint:"Bottom-up DP — sirf 2 variables rakhho, space O(1).",solution:`def fibonacci(n):\n    if n <= 1:\n        return n\n    a, b = 0, 1\n    for _ in range(2, n+1):\n        a, b = b, a + b\n    return b`,keywords:["fibonacci","fib","dp","dynamic programming"]},
  {id:10,topic:"Binary Search",difficulty:"Easy",question:"Binary Search: Sorted array mein target element ka index find karo.",example:"Input: arr=[-1,0,3,5,9,12], target=9 → Output: 4",hint:"Left aur right pointers — mid calculate karke range narrow karo.",solution:`def binary_search(arr, target):\n    left, right = 0, len(arr) - 1\n    while left <= right:\n        mid = (left + right) // 2\n        if arr[mid] == target:\n            return mid\n        elif arr[mid] < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return -1`,keywords:["binary search","search","sorted array"]},
];

const ERROR_PATTERNS = [
  {re:/def\s+\w+\([^)]*\)\s*[^:\n{]/m, msg:"❌ Syntax Error: Function definition ke baad ':' missing!\nFix: def function_name():"},
  {re:/for\s+\w+\s+in\s+\w+[^:\n]/m, msg:"❌ Syntax Error: for loop ke baad ':' missing!\nFix: for i in range(n):"},
  {re:/print\s+[^(]/m, msg:"❌ Syntax Error: print mein brackets missing!\nFix: print(value)"},
  {re:/\blenght\b|\blenth\b/i, msg:"❌ NameError: 'lenght' galat spelling!\nFix: len(array)"},
  {re:/\bapend\b/i, msg:"❌ AttributeError: 'apend' galat spelling!\nFix: list.append(value)"},
  {re:/\bretrun\b/i, msg:"❌ SyntaxError: 'retrun' galat spelling!\nFix: return value"},
  {re:/\/\s*0[^.]/m, msg:"❌ ZeroDivisionError: Zero se divide!\nFix: pehle check karo denominator != 0"},
];

function analyzeCode(code) {
  const errs = ERROR_PATTERNS.filter(e => e.re.test(code)).map(e => e.msg);
  const lines = code.split('\n');
  for (let i = 0; i < lines.length - 1; i++) {
    if (/^\s*(def|if|for|while|else|elif|try|except)\b.*:$/.test(lines[i])) {
      if (lines[i+1] && lines[i+1].trim() && !/^\s{4}/.test(lines[i+1]) && !/^\t/.test(lines[i+1])) {
        errs.push("❌ IndentationError: Block ke andar 4 spaces chahiye!\nFix: if/for/def ke baad waali lines indent karo.");
        break;
      }
    }
  }
  return errs.length === 0
    ? {ok:true, msg:"✅ Code mein koi obvious error nahi!\n\nLogic sahi lag raha hai 🎉\nEdge cases check karo:\n• Empty input\n• Negative numbers\n• Large values"}
    : {ok:false, msg: errs.join('\n\n') + '\n\n💡 In errors fix karo!'};
}

// ── STATE ──────────────────────────────────────────────
let currentQ = null;
let codeMode = false;

// ── TOPICS ──────────────────────────────────────────────
const TOPICS = ["Array","String","LinkedList","Tree","Stack","Graph","Sorting","Binary Search","DP"];
const topicsEl = document.getElementById('topics');
TOPICS.forEach(t => {
  const b = document.createElement('button');
  b.className = 'topic-btn';
  b.textContent = t;
  b.onclick = () => sendMessage(t);
  topicsEl.appendChild(b);
});

// ── RENDER ──────────────────────────────────────────────
const messagesEl = document.getElementById('messages');

function addMsg(from, content, type='info') {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${from}`;

  if (from === 'bot') {
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'DSA_BOT';
    wrap.appendChild(label);
  }

  if (content.type === 'question') {
    const q = content.q;
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `
      <div class="q-card-header">
        <span class="q-id">#${q.id} ${q.topic.toUpperCase()}</span>
        <span class="q-diff diff-${q.difficulty}">${q.difficulty}</span>
      </div>
      <div class="q-body">
        <div class="q-text">${q.question}</div>
        <div class="q-example">${q.example}</div>
        <div class="q-btns">
          <button class="q-btn hint" onclick="showHint()">💡 Hint</button>
          <button class="q-btn solution" onclick="showSolution()">✅ Solution</button>
          <button class="q-btn next" onclick="nextQ()">⏭ Next</button>
        </div>
      </div>`;
    wrap.appendChild(card);
  } else if (content.type === 'code') {
    const bubble = document.createElement('div');
    bubble.className = `bubble bot`;
    bubble.innerHTML = `<div style="margin-bottom:6px;color:rgba(255,255,255,.85);font-size:13.5px">${content.text}</div>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">python</span><button class="code-copy" onclick="copyCode(this,'${encodeURIComponent(content.code)}')">Copy</button></div>
        <pre>${content.code}</pre>
      </div>`;
    wrap.appendChild(bubble);
  } else {
    const bubble = document.createElement('div');
    bubble.className = `bubble ${from} ${type}`;
    bubble.textContent = content.text || content;
    if (from === 'user' && codeMode) bubble.style.fontFamily = "'JetBrains Mono',monospace";
    wrap.appendChild(bubble);
  }

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  wrap.appendChild(time);

  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function copyCode(btn, encoded) {
  navigator.clipboard.writeText(decodeURIComponent(encoded));
  btn.textContent = '✓ Copied!';
  setTimeout(() => btn.textContent = 'Copy', 2000);
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  wrap.id = 'typing';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'DSA_BOT';
  const dots = document.createElement('div');
  dots.className = 'bubble bot';
  dots.style.padding = '0';
  dots.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(label);
  wrap.appendChild(dots);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

// ── BOT LOGIC ──────────────────────────────────────────
function getBotResponse(input) {
  const low = input.toLowerCase().trim();
  if (['hello','hi','hey','salam','namaste','hii'].some(w => low.includes(w)))
    return {text:"Hello! 👋 Main DSA Bot hoon!\n\n🧠 DSA questions — 'start' likho\n🔍 Code check — 💻 button dabao\n💡 Hint — 'hint'\n✅ Solution — 'solution'\n⏭ Next — 'next'", type:'info'};
  if (low.includes('start')||low.includes('quiz')||low.includes('shuru')||low.includes('question'))
    return {type:'newq'};
  if (low.includes('hint'))
    return currentQ ? {text:`💡 Hint:\n${currentQ.hint}`, type:'hint'} : {text:"Pehle 'start' karo!",type:'info'};
  if (low.includes('solution')||low.includes('answer'))
    return currentQ ? {type:'solution'} : {text:"Pehle 'start' karo!",type:'info'};
  if (low.includes('next')||low.includes('skip')||low.includes('agle'))
    return {type:'newq'};
  for (const q of DSA_QUESTIONS)
    if (q.keywords.some(k=>low.includes(k))||low.includes(q.topic.toLowerCase()))
      return {type:'specificq', q};
  if (low.includes('def ')||low.includes('for ')||low.includes('while ')||low.includes('return ')||input.includes('{')||input.includes('=>')||low.includes('function')) {
    const r = analyzeCode(input);
    return {text:r.msg, type: r.ok?'success':'error'};
  }
  if (low.includes('help')||low.includes('madad'))
    return {text:"🆘 Commands:\n\n• start — Random DSA question\n• array/tree/graph — Topic question\n• hint — Current hint\n• solution — Solution dekho\n• next — Agla question\n• 💻 button — Code check mode",type:'info'};
  return {text:"Hmm 🤔\n'start' likho — DSA question milega\nYa code paste karo — errors check karunga!",type:'info'};
}

function showHint() {
  if (!currentQ) return;
  addMsg('bot', {text:`💡 Hint:\n${currentQ.hint}`}, 'hint');
}
function showSolution() {
  if (!currentQ) return;
  addMsg('bot', {type:'code', text:'✅ Solution:', code: currentQ.solution});
}
function nextQ() {
  currentQ = DSA_QUESTIONS[Math.floor(Math.random()*DSA_QUESTIONS.length)];
  addMsg('bot', {type:'question', q:currentQ});
}

function processResponse(res) {
  if (res.type === 'newq') { nextQ(); return; }
  if (res.type === 'specificq') { currentQ = res.q; addMsg('bot',{type:'question',q:res.q}); return; }
  if (res.type === 'solution') { showSolution(); return; }
  addMsg('bot', {text:res.text}, res.type);
}

// ── SEND ──────────────────────────────────────────────
function sendMessage(forced) {
  const inp = document.getElementById('msgInput');
  const text = (forced || inp.value).trim();
  if (!text) return;
  addMsg('user', {text}, 'user');
  if (!forced) { inp.value=''; inp.style.height='auto'; updateSendBtn(); }
  const wasCode = codeMode;
  if (!forced) { codeMode=false; updateCodeMode(); }
  showTyping();
  setTimeout(() => {
    removeTyping();
    const res = wasCode && !forced ? (()=>{ const r=analyzeCode(text); return {text:r.msg,type:r.ok?'success':'error'}; })() : getBotResponse(text);
    processResponse(res);
  }, 700 + Math.random()*500);
}

function toggleCodeMode() {
  codeMode = !codeMode;
  updateCodeMode();
}
function updateCodeMode() {
  const inp = document.getElementById('msgInput');
  const box = document.getElementById('inputBox');
  const label = document.getElementById('codeModeLabel');
  const btn = document.getElementById('btnCode');
  inp.className = codeMode ? 'codemode' : '';
  inp.placeholder = codeMode ? 'Apna code yahan paste karo...' : 'DSA question poochho ya code paste karo...';
  box.className = codeMode ? 'input-box codemode' : 'input-box';
  label.className = codeMode ? 'code-mode-label show' : 'code-mode-label';
  btn.className = codeMode ? 'btn-code active' : 'btn-code';
}
function updateSendBtn() {
  const v = document.getElementById('msgInput').value.trim();
  const b = document.getElementById('btnSend');
  b.className = v ? 'btn-send active' : 'btn-send';
}

document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  updateSendBtn();
});
document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── INIT ──────────────────────────────────────────────
addMsg('bot', {text:"Assalamualaikum! Main hoon DSA Bot 🤖\n\nMain aapki help karunga:\n🧠 DSA Questions — practice ke liye\n🔍 Code Error Check — aapka code analyze\n💡 Hints & Solutions — jab zaroorat ho\n\n'start' likho ya neeche topic select karo! 👇"}, 'info');
</script>
